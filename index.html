<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Social</title>
    <link rel="stylesheet" href="./styles/styles.css" />
    <link
      href="https://cdn-icons-png.flaticon.com/512/6821/6821173.png"
      rel="icon"
      type="image/x-icon"
    />
  </head>

  <body>
    <nav id="navbar">
      <div id="nav-logo">
        <a onclick="abrirModalPost()" style="cursor: pointer">+</a>
      </div>
      <div id="nav-links">
        <a onclick="navegarA('home')" class="nav-link">Home</a>
        <a onclick="navegarA('profile')" class="nav-link">Perfil</a>
      </div>
      <div id="nav-search">
        <a onclick="abrirBuscador()" class="nav-link">Buscar</a>
      </div>
    </nav>

    <main id="content"></main>

    <!-- Panel buscador -->
    <div id="panel-buscador">
      <button onclick="cerrarBuscador()" id="btn-cerrar">✕</button>
      <input type="text" id="buscarInput" placeholder="Buscar usuario" />
      <button onclick="buscar()">Buscar</button>
      <div id="usuariosBuscados"></div>
    </div>

    <!-- Modals crear posts -->
    <div id="modal-post">
      <div id="modal-post-container">
        <textarea
          id="post-input"
          placeholder="Empieza a escribir..."
        ></textarea>
        <div id="modal-post-buttons">
          <button onclick="descartarPost()">descartar</button>
          <button onclick="publicarPost()">publicar</button>
        </div>
      </div>
    </div>
    <!-- Modal editar/eliminar post -->
    <div id="modal-editar-post">
      <div id="modal-editar-container">
        <textarea id="editar-post-input"></textarea>
        <div id="modal-editar-buttons">
          <button onclick="cerrarModalEditar()">cancelar</button>
          <button onclick="eliminarPostModal()">eliminar</button>
          <button onclick="guardarEdicion()">guardar</button>
        </div>
      </div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
