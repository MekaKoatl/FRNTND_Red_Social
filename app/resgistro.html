<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <main id="auth-container">
    <h2>Crear cuenta</h2>
    <input id="email" type="email" placeholder="Correo electrónico">
    <input id="username" type="text" placeholder="Nombre de usuario único">
    <input id="password" type="password" placeholder="Contraseña (mínimo 8 caracteres)">
    <p id="error-msg"></p>
    <button onclick="registrarse()">Registrarse</button>
    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
  </main>

  <!--
  1. condicional contraseña de al menos 6 caracteres para registrarse
  2. condicional user único para registrarse
  3. guardar la contraseña cifrada
  -->

  <script type="module" src="../js/pages/registro.js"></script>
</body>
</html>
